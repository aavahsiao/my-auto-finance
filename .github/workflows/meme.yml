name: 迷因哏圖製造機
on:
  schedule:
    - cron: '0 12 * * *' # UTC 12:00 = 台灣晚上 20:00（IG / Threads prime time）
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4

      - name: 安裝中文字型
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝工具套件
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas google-genai pillow

      - name: 生成迷因哏圖
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python meme.py

      - name: 將迷因存回雲端
        run: |
          git config --global user.name "AI-Bot"
          git config --global user.email "bot@github.com"
          git add daily_meme.png
          git commit -m "更新今日迷因: $(date -u +'%Y-%m-%d')" || exit 0
          git push

      - name: 寄送迷因到信箱
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: 🤡 今日財經迷因 - ${{ github.run_number }}
          to: ${{ secrets.GMAIL_USERNAME }}
          from: AI 迷因小編
          body: 今日 IG / Threads 用迷因哏圖已生成，附件請查收。
          attachments: daily_meme.png
