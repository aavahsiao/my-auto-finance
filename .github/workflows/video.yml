name: 全自動影片合成
on:
  workflow_run:
    workflows: ["每日自動更新腳本"]   # v2 跑完自動接力
    types: [completed]
  workflow_dispatch:
jobs:
  build:
    # 只在 v2 成功時執行；手動觸發也可以
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 檢查程式碼（拉 v2 剛 push 的最新素材）
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 安裝中文字型 + ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk ffmpeg

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝 gTTS
        run: pip install gTTS

      - name: 合成影片（ffmpeg 已內建在 runner）
        run: python video.py

      - name: 將影片存回雲端
        run: |
          git config --global user.name "AI-Bot"
          git config --global user.email "bot@github.com"
          git add daily_video.mp4
          git commit -m "更新今日影片: $(date -u +'%Y-%m-%d')" || exit 0
          git push

      - name: 寄送影片到信箱
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: 🎬 今日 AI 影片 - ${{ github.run_number }}
          to: ${{ secrets.GMAIL_USERNAME }}
          from: AI 影片合成器
          body: 你今天的 30 秒財經短影音已合成完畢，附件請查收。
          attachments: daily_video.mp4
