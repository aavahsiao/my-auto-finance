name: 每日自動更新腳本
on:
  schedule:
    - cron: '0 7 * * *' # 國際標準時間 7:00 等於台灣時間 15:00
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4

      - name: 安裝中文字型（讓圖表能顯示中文）
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝工具套件
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas google-genai feedparser matplotlib

      - name: 執行抓取程式
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: 將結果存回雲端
        run: |
          git config --global user.name "AI-Bot"
          git config --global user.email "bot@github.com"
          git add daily_script.txt daily_titles.txt daily_description.txt daily_subtitles.srt daily_chart.png
          git commit -m "更新今日素材: $(date -u +'%Y-%m-%d')" || exit 0
          git push

      - name: 寄送每日腳本到信箱
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: 📈 今日 AI 財經腳本 - ${{ github.run_number }}
          to: ${{ secrets.GMAIL_USERNAME }}
          from: AI 財經助理
          body: file://daily_script.txt
          attachments: daily_chart.png,daily_subtitles.srt,daily_description.txt,daily_titles.txt
